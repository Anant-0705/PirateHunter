version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: piratehunt-postgres
    environment:
      POSTGRES_USER: piratehunt
      POSTGRES_PASSWORD: piratehunt
      POSTGRES_DB: piratehunt
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piratehunt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: piratehunt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
